<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Luyện Phát Âm Tiếng Anh - Chủ Đề Trái Cây</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: linear-gradient(135deg, #a78bfa 0%, #fbcfe8 100%); font-family: 'Nunito', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; padding: 20px; }
        .game-board { width: 1000px; max-width: 100%; height: 680px; background-color: rgba(255, 255, 255, 0.95); border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.15); border: 8px solid #fdf4ff; position: relative; padding: 25px 30px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 15px; width: 100%; }
        .header h1 { font-family: 'Comfortaa', cursive; color: #7c3aed; font-size: 36px; text-shadow: 2px 2px 0px #f3e8ff; margin-bottom: 5px; }
        .progress-container { width: 70%; height: 16px; background-color: #f1f5f9; border-radius: 10px; margin: 0 auto; overflow: hidden; border: 2px solid #e2e8f0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #34d399 0%, #10b981 100%); width: 0%; transition: width 0.5s ease-in-out; border-radius: 10px; }
        .flashcard-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; width: 100%; }
        .flashcard { background-color: white; width: 320px; height: 330px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 4px solid #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.3s ease; }
        .flashcard.success { border-color: #34d399; box-shadow: 0 0 40px rgba(52, 211, 153, 0.4); transform: scale(1.03); }
        .flashcard.error { border-color: #f87171; animation: shake 0.4s ease-in-out; }
        .emoji-display { font-size: 100px; margin-bottom: 10px; }
        .word-en { font-family: 'Comfortaa', cursive; font-size: 38px; font-weight: 900; color: #1e293b; }
        .word-vi { font-size: 20px; color: #64748b; font-weight: 700; }
        
        .btn-listen { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background-color: #f8fafc; border: 2px solid #cbd5e1; color: #3b82f6; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        
        .controls-area { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 10px; }
        .btn-mic { width: 85px; height: 85px; border-radius: 50%; background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); border: none; color: white; font-size: 38px; cursor: pointer; box-shadow: 0 10px 20px rgba(225, 29, 72, 0.3); transition: all 0.3s; }
        .btn-mic.recording { animation: pulse 1.5s infinite; background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); }
        
        /* Cấu trúc nút Tiếp theo */
        .btn-next { margin-top: 20px; padding: 15px 40px; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; border-radius: 50px; font-family: 'Comfortaa', cursive; font-size: 20px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 16px rgba(59, 130, 246, 0.4); display: none; transition: transform 0.2s; }
        .btn-next:hover { transform: scale(1.05); }
        
        .status-text { margin-top: 15px; font-size: 18px; font-weight: 700; color: #475569; text-align: center; min-height: 50px; }
        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-radius: 40px; display: none; }
        .modal.active { display: flex; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
    </style>
</head>
<body>
    <div class="game-board">
        <div class="header">
            <h1>Bé Tập Nói Tiếng Anh</h1>
            <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
            <p style="margin-top: 8px; color: #64748b; font-weight: bold;">Trái Cây: <span id="current-count">1</span> / <span id="total-count">5</span></p>
        </div>

        <div class="flashcard-area">
            <div class="flashcard" id="flashcard">
                <button class="btn-listen" onclick="playCurrentWord()"><i class="fa-solid fa-volume-high"></i></button>
                <div class="emoji-display" id="display-emoji">🍌</div>
                <div class="word-en" id="display-en">Banana</div>
                <div class="word-vi" id="display-vi">Quả chuối</div>
            </div>
        </div>

        <div class="controls-area">
            <button class="btn-mic" id="btn-mic" onclick="toggleRecording()"><i class="fa-solid fa-microphone"></i></button>
            <div class="status-text" id="status-text">Nhấn Micro để đọc theo nhé!</div>
            <!-- Nút Tiếp theo mới -->
            <button class="btn-next" id="btn-next" onclick="nextWord()">Tiếp theo <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
        const fruitData = [
            { en: "Banana", vi: "Quả chuối", emoji: "🍌" },
            { en: "Orange", vi: "Quả cam", emoji: "🍊" },
            { en: "Mango", vi: "Quả xoài", emoji: "🥭" },
            { en: "Grape", vi: "Quả nho", emoji: "🍇" },
            { en: "Apple", vi: "Quả táo", emoji: "🍎" }
        ];

        let currentIndex = 0;
        let recognitionActive = false;

        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = new SpeechRecognition();
        recognition.lang = 'en-US';

        function loadWord() {
            const word = fruitData[currentIndex];
            document.getElementById("display-emoji").innerText = word.emoji;
            document.getElementById("display-en").innerText = word.en;
            document.getElementById("display-vi").innerText = word.vi;
            document.getElementById("current-count").innerText = currentIndex + 1;
            document.getElementById("progress-bar").style.width = `${((currentIndex + 1) / fruitData.length) * 100}%`;
            document.getElementById("btn-next").style.display = "none";
            document.getElementById("status-text").innerText = "Nhấn Micro để đọc theo nhé!";
            document.getElementById("flashcard").className = "flashcard";
        }

        function toggleRecording() {
            if (recognitionActive) {
                recognition.stop();
            } else {
                recognition.start();
                recognitionActive = true;
                document.getElementById("btn-mic").classList.add("recording");
            }
        }

        recognition.onresult = function(event) {
            const spoken = event.results[0][0].transcript.toLowerCase();
            const target = fruitData[currentIndex].en.toLowerCase();
            
            if (spoken.includes(target)) {
                document.getElementById("flashcard").className = "flashcard success";
                document.getElementById("status-text").innerText = "Bé giỏi quá! Phát âm chuẩn rồi!";
                document.getElementById("btn-next").style.display = "block"; // Hiện nút tiếp theo
            } else {
                document.getElementById("flashcard").className = "flashcard error";
                document.getElementById("status-text").innerText = "Chưa đúng lắm, bé thử lại nhé!";
            }
        };

        recognition.onend = () => {
            recognitionActive = false;
            document.getElementById("btn-mic").classList.remove("recording");
        };

        function nextWord() {
            currentIndex++;
            if (currentIndex < fruitData.length) loadWord();
            else alert("Bé đã hoàn thành bài học!");
        }

        function playCurrentWord() {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(fruitData[currentIndex].en);
            synth.speak(utter);
        }

        window.onload = loadWord;
    </script>
</body>
</html>
