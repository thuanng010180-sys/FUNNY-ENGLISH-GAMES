<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Học Tiếng Anh - Trò Chơi Nối Từ Trực Quan</title>
    <!-- Nhập các font chữ trẻ em ngộ nghĩnh và biểu tượng -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Afacad+Flux:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ================= SETUP THỂ HIỆN & KHÔNG GIAN GAME ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #fef08a 0%, #d9f99d 100%);
            font-family: 'Afacad Flux', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* Khung thiết kế tỷ lệ 16:9 mượt mà cho Canva Widget */
        .game-board {
            width: 1100px;
            height: 650px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            border: 8px solid #a3e635;
            position: relative;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Đầu trang sinh động */
        .game-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .game-header h1 {
            font-family: 'Comfortaa', cursive;
            color: #1e3a8a;
            font-size: 38px;
            text-shadow: 2px 2px 0px #fef08a;
            margin-bottom: 5px;
        }

        .game-header p {
            font-size: 18px;
            color: #475569;
            font-weight: 600;
        }

        /* Thêm CSS cho nút chọn cấp độ */
        .level-selection {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-level {
            font-family: 'Afacad Flux', sans-serif;
            background-color: #e2e8f0;
            color: #475569;
            border: 2px solid #cbd5e1;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-level:hover {
            background-color: #bae6fd;
            border-color: #7dd3fc;
            color: #0284c7;
        }

        .btn-level.active {
            background-color: #3b82f6;
            border-color: #2563eb;
            color: white;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
        }

        /* Thống kê điểm số vui nhộn */
        .score-bar {
            display: flex;
            justify-content: space-between;
            background: #f0fdf4;
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid #bbf7d0;
            margin-bottom: 20px;
        }

        .score-item {
            font-size: 18px;
            font-weight: bold;
            color: #166534;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ================= BỐ CỤC CHƠI GAME & NỐI DÂY ================= */
        .play-area {
            position: relative;
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 160px; /* Tạo không gian vẽ đường nối ở giữa */
            z-index: 2;
        }

        /* Cột bên trái: Thẻ chữ */
        .column-words, .column-images {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
            gap: 8px;
        }

        /* Thẻ từ vựng tiếng Anh kèm nút phát âm */
        .word-card {
            background-color: #f1f5f9;
            border: 3px solid #cbd5e1;
            border-radius: 16px;
            padding: 10px 20px;
            font-family: 'Comfortaa', cursive;
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .word-card:hover {
            transform: translateY(-2px);
            border-color: #60a5fa;
            background-color: #eff6ff;
        }

        .word-card.active {
            background-color: #60a5fa;
            color: white;
            border-color: #2563eb;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .word-card.matched {
            background-color: #bbf7d0 !important;
            border-color: #22c55e !important;
            color: #15803d !important;
            cursor: default;
            transform: none !important;
        }

        .word-card .speaker-icon {
            font-size: 20px;
            color: #475569;
            transition: color 0.2s;
        }

        .word-card.active .speaker-icon {
            color: white;
        }

        .word-card.matched .speaker-icon {
            color: #166534;
        }

        /* Thẻ hình ảnh ngộ nghĩnh */
        .image-card {
            background-color: #ffffff;
            border: 3px solid #cbd5e1;
            border-radius: 16px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .image-card:hover {
            transform: translateY(-2px);
            border-color: #fca5a5;
            background-color: #fff5f5;
        }

        .image-card.active {
            border-color: #fca5a5;
            background-color: #ffe4e6;
            box-shadow: 0 0 15px rgba(251, 113, 133, 0.4);
        }

        .image-card.matched {
            border-color: #22c55e !important;
            background-color: #f0fdf4 !important;
            cursor: default;
            transform: none !important;
        }

        /* Style mới cho nội dung thẻ kết hợp Emoji và Tiếng Việt */
        .image-card .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.1;
        }

        .image-card .card-emoji {
            font-size: 26px;
            margin-bottom: 2px;
        }

        .image-card .card-vie {
            font-family: 'Afacad Flux', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            text-align: center;
        }

        /* Điểm kết nối nhỏ để neo đường vẽ */
        .anchor-point {
            width: 12px;
            height: 12px;
            background-color: #94a3b8;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            transition: background-color 0.2s;
        }

        .word-card .anchor-point {
            right: -6px;
        }

        .image-card .anchor-point {
            left: -6px;
        }

        .word-card.matched .anchor-point, 
        .image-card.matched .anchor-point {
            background-color: #22c55e;
        }

        /* Lớp vẽ dòng nối giữa 2 cột */
        .connecting-lines-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ================= HIỆU ỨNG RUNG LẮC LỖI & PHÁO HOA CHÚC MỪNG ================= */
        .shake {
            animation: shakeAnim 0.4s ease-in-out;
        }

        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        /* Bảng chiến thắng tuyệt đẹp */
        .congrats-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 24px;
            transform: scale(0.9);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .congrats-modal.show {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .congrats-modal h2 {
            font-family: 'Comfortaa', cursive;
            font-size: 50px;
            color: #15803d;
            margin-bottom: 15px;
            text-align: center;
        }

        .congrats-modal p {
            font-size: 22px;
            color: #475569;
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
        }

        .btn-restart {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            transition: all 0.2s ease;
        }

        .btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.4);
        }

        /* Hiệu ứng bong bóng chúc mừng */
        .bubble {
            position: absolute;
            bottom: -50px;
            background-color: rgba(163, 230, 53, 0.6);
            border-radius: 50%;
            animation: riseUp 4s infinite ease-in;
            pointer-events: none;
            z-index: 99;
        }

        @keyframes riseUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-700px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="game-board">
        <!-- Đầu trang hiển thị trạng thái -->
        <div class="game-header">
            <h1>Bé Nối Từ Tiếng Anh</h1>
            <p>Nhấn vào Thẻ Từ vựng, nghe phát âm rồi chọn Hình ảnh phù hợp tương ứng nhé!</p>
        </div>

        <!-- Cụm nút chọn Cấp độ -->
        <div class="level-selection">
            <button class="btn-level" id="btn-lvl-4" onclick="setLevel(4)">Dễ (4 Từ)</button>
            <button class="btn-level active" id="btn-lvl-6" onclick="setLevel(6)">Trung Bình (6 Từ)</button>
            <button class="btn-level" id="btn-lvl-8" onclick="setLevel(8)">Khó (8 Từ)</button>
        </div>

        <!-- Thanh điểm số cho bé -->
        <div class="score-bar">
            <div class="score-item">
                <i class="fa-solid fa-star" style="color: #fbbf24;"></i>
                <span>Điểm của bé: <strong id="score-text">0/6</strong></span>
            </div>
            <div class="score-item">
                <i class="fa-solid fa-heart" style="color: #f43f5e;"></i>
                <span>Số lần thử sai: <strong id="mistakes-text">0</strong></span>
            </div>
        </div>

        <!-- Khu vực chơi tương tác kéo nối vẽ dây -->
        <div class="play-area">
            <!-- SVG dùng để vẽ các nét nối chính xác giữa các điểm neo -->
            <svg class="connecting-lines-svg" id="lines-svg"></svg>

            <!-- Cột bên trái: Thẻ chữ mẫu giáo (English Words) -->
            <div class="column-words" id="words-container">
                <!-- Sẽ tự động nạp ngẫu nhiên bằng JS -->
            </div>

            <!-- Cột bên phải: Thẻ hình ảnh ngộ nghĩnh (Flashcard Images) -->
            <div class="column-images" id="images-container">
                <!-- Sẽ tự động nạp ngẫu nhiên bằng JS -->
            </div>
        </div>

        <!-- Cửa sổ màn hình chúc mừng bé thắng cuộc -->
        <div class="congrats-modal" id="congrats-screen">
            <i class="fa-solid fa-trophy" style="font-size: 100px; color: #fbbf24; margin-bottom: 20px;"></i>
            <h2>CONGRATULATIONS!</h2>
            <p>Bé thật xuất sắc! Bé đã nghe và nối chính xác toàn bộ 6 từ vựng hôm nay rồi đấy. Ba mẹ hãy thưởng cho bé một tràng pháo tay nhé! 🎉</p>
            <button class="btn-restart" onclick="restartGame()">Chơi lại nha <i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </div>

    <script>
        // ================= DỮ LIỆU TỪ FLASHCARD PPTX =================
        // Dữ liệu 25 loại quả được trích xuất từ hình ảnh của bạn
        const fullFruitData = [
            { id: "pomelo", word: "Pomelo", translation: "Quả bưởi", emoji: "🍈" },
            { id: "orange", word: "Orange", translation: "Quả cam", emoji: "🍊" },
            { id: "rambutan", word: "Rambutan", translation: "Quả chôm chôm", emoji: "🔴" },
            { id: "durian", word: "Durian", translation: "Quả sầu riêng", emoji: "🦔" },
            { id: "starfruit", word: "Starfruit", translation: "Quả khế", emoji: "⭐" },
            { id: "roseapple", word: "Rose-apple", translation: "Quả roi", emoji: "🍎" },
            { id: "lemon", word: "Lemon", translation: "Quả chanh", emoji: "🍋" },
            { id: "pomegranate", word: "Pomegranate", translation: "Quả lựu", emoji: "🩸" },
            { id: "dragonfruit", word: "Dragon fruit", translation: "Quả thanh long", emoji: "🐉" },
            { id: "banana", word: "Banana", translation: "Quả chuối", emoji: "🍌" },
            { id: "longan", word: "Longan", translation: "Quả nhãn", emoji: "🥔" },
            { id: "grape", word: "Grape", translation: "Quả nho", emoji: "🍇" },
            { id: "mango", word: "Mango", translation: "Quả xoài", emoji: "🥭" },
            { id: "papaya", word: "Papaya", translation: "Quả đu đủ", emoji: "🟠" },
            { id: "peach", word: "Peach", translation: "Quả đào", emoji: "🍑" },
            { id: "mangosteen", word: "Mangosteen", translation: "Quả măng cụt", emoji: "🟣" },
            { id: "watermelon", word: "Watermelon", translation: "Quả dưa hấu", emoji: "🍉" },
            { id: "plums", word: "Plums", translation: "Quả mận", emoji: "🫐" },
            { id: "jackfruit", word: "Jackfruit", translation: "Quả mít", emoji: "🟡" },
            { id: "pineapple", word: "Pineapple", translation: "Quả dứa", emoji: "🍍" },
            { id: "avocado", word: "Avocado", translation: "Quả bơ", emoji: "🥑" },
            { id: "guava", word: "Guava", translation: "Quả ổi", emoji: "🍏" },
            { id: "custardapple", word: "Custard-apple", translation: "Quả na", emoji: "🟢" },
            { id: "lychee", word: "Lychee", translation: "Quả vải", emoji: "🍒" },
            { id: "persimmon", word: "Persimmon", translation: "Quả hồng đỏ", emoji: "🍅" }
        ];

        let gameData = [];
        let currentLevel = 6; // Mặc định hiển thị 6 từ

        let selectedWordId = null;
        let selectedImageId = null;
        let score = 0;
        let mistakes = 0;
        let matchedPairs = []; // Lưu các cặp đã nối đúng để vẽ lại đường nối khi đổi kích cỡ cửa sổ

        // Khởi tạo bộ máy tạo âm thanh sfx độc lập (Synthesizer Audio)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // ================= KHẢ NĂNG PHÁT ÂM TIẾNG ANH CHUẨN (TTS) =================
        function speakWord(text) {
            if ('speechSynthesis' in window) {
                // Hủy bỏ các giọng đọc cũ đang dồn ứ
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; // Tốc độ nói hơi chậm một chút để trẻ em dễ bắt chước âm phát
                window.speechSynthesis.speak(utterance);
            }
        }

        // ================= HỆ THỐNG ÂM THANH SFX ĐỘC LẬP TỔNG HỢP =================
        // Thiết kế âm thanh "Khích lệ động viên vỗ tay" (Ascending Positive Chime)
        function playSuccessSound() {
            const now = audioCtx.currentTime;
            
            // Âm Arpeggio vui vẻ
            const notes = [261.63, 329.63, 392.00, 523.25, 659.25]; // Đô - Mi - Sol - Đô - Mi
            notes.forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.value = freq;
                
                gainNode.gain.setValueAtTime(0, now + idx * 0.08);
                gainNode.gain.linearRampToValueAtTime(0.2, now + idx * 0.08 + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.08 + 0.35);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(now + idx * 0.08);
                osc.stop(now + idx * 0.08 + 0.4);
            });

            // Tiếng xào xạc mô phỏng tràng vỗ tay (White noise burst)
            setTimeout(() => { playClapBurst(); }, 200);
            setTimeout(() => { playClapBurst(); }, 350);
            setTimeout(() => { playClapBurst(); }, 500);
        }

        function playClapBurst() {
            const bufferSize = audioCtx.sampleRate * 0.15;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 1000;

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        // Thiết kế âm thanh "Oh No" vui nhộn (Pitch Drop Buzz) khi đoán sai
        function playFailSound() {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sawtooth';
            // Tần số rớt từ cao xuống thấp đột ngột tạo hiệu ứng ngộ nghĩnh
            osc.frequency.setValueAtTime(220, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.48);

            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start(now);
            osc.stop(now + 0.5);
        }

        // Phát ngẫu nhiên các câu khích lệ động viên bằng tiếng Anh của thầy giáo AI
        function speakEncouragement() {
            const cheers = [
                "Excellent!",
                "Wow, fantastic!",
                "You are amazing!",
                "Super job!",
                "Great matching!",
                "Perfect!"
            ];
            const randomCheer = cheers[Math.floor(Math.random() * cheers.length)];
            setTimeout(() => {
                speakWord(randomCheer);
            }, 750); // Nói câu khen sau khi phát âm từ vựng chính xong
        }

        // ================= HÀM XÁO TRỘN ĐỘC LẬP =================
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // ================= THIẾT LẬP CẤP ĐỘ =================
        function setLevel(num) {
            currentLevel = num;
            // Cập nhật giao diện nút
            document.querySelectorAll('.btn-level').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-lvl-${num}`).classList.add('active');
            initGame();
        }

        // ================= KHỞI TẠO BÀN CHƠI GAME MỚI =================
        function initGame() {
            // Đặt lại các biến trạng thái
            selectedWordId = null;
            selectedImageId = null;
            score = 0;
            mistakes = 0;
            matchedPairs = [];
            
            document.getElementById("score-text").innerText = `0/${currentLevel}`;
            document.getElementById("mistakes-text").innerText = "0";
            document.getElementById("lines-svg").innerHTML = "";
            document.getElementById("congrats-screen").classList.remove("show");

            // Chọn ngẫu nhiên số lượng từ theo cấp độ từ bộ dữ liệu Fruit đầy đủ
            const shuffledFullData = shuffle([...fullFruitData]);
            gameData = shuffledFullData.slice(0, currentLevel);

            // Xáo trộn cột từ và cột ảnh độc lập để bé không nối ngang
            const shuffledWords = shuffle([...gameData]);
            const shuffledImages = shuffle([...gameData]);

            const wordsContainer = document.getElementById("words-container");
            const imagesContainer = document.getElementById("images-container");

            wordsContainer.innerHTML = "";
            imagesContainer.innerHTML = "";

            // Tạo các thẻ cột Chữ tiếng Anh
            shuffledWords.forEach(item => {
                const card = document.createElement("div");
                card.className = "word-card";
                card.id = `word-${item.id}`;
                card.dataset.id = item.id;
                card.onclick = () => selectWord(item.id);

                card.innerHTML = `
                    <span>${item.word}</span>
                    <i class="fa-solid fa-volume-high speaker-icon"></i>
                    <div class="anchor-point"></div>
                `;
                wordsContainer.appendChild(card);
            });

            // Tạo các thẻ cột Hình ảnh minh họa (Sử dụng cấu trúc Giao diện Thẻ từ vựng Việt)
            shuffledImages.forEach(item => {
                const card = document.createElement("div");
                card.className = "image-card";
                card.id = `img-${item.id}`;
                card.dataset.id = item.id;
                card.onclick = () => selectImage(item.id);

                card.innerHTML = `
                    <div class="card-content">
                        <span class="card-emoji">${item.emoji}</span>
                        <span class="card-vie">${item.translation}</span>
                    </div>
                    <div class="anchor-point"></div>
                `;
                imagesContainer.appendChild(card);
            });

            // Tạo bóng bay ngộ nghĩnh bay lên nền
            createBackgroundBubbles();
        }

        // ================= CHỌN THẺ CHỮ VÀ PHÁT ÂM =================
        function selectWord(id) {
            // Không thao tác nếu thẻ đã nối đúng trước đó
            if (matchedPairs.includes(id)) return;

            // Kích hoạt phát âm chuẩn ngay lập tức khi nhấn
            const item = gameData.find(d => d.id === id);
            speakWord(item.word);

            // Cập nhật trạng thái thẻ được chọn
            document.querySelectorAll(".word-card").forEach(c => c.classList.remove("active"));
            
            const card = document.getElementById(`word-${id}`);
            card.classList.add("active");
            selectedWordId = id;

            // Kiểm tra nối từ nếu đã chọn sẵn hình ảnh
            checkMatch();
        }

        // ================= CHỌN THẺ HÌNH ẢNH =================
        function selectImage(id) {
            if (matchedPairs.includes(id)) return;

            document.querySelectorAll(".image-card").forEach(c => c.classList.remove("active"));
            
            const card = document.getElementById(`img-${id}`);
            card.classList.add("active");
            selectedImageId = id;

            checkMatch();
        }

        // ================= KIỂM TRA ĐỐI CHIẾU CẶP NỐI =================
        function checkMatch() {
            if (selectedWordId !== null && selectedImageId !== null) {
                const wordCard = document.getElementById(`word-${selectedWordId}`);
                const imgCard = document.getElementById(`img-${selectedImageId}`);

                if (selectedWordId === selectedImageId) {
                    // --- THÀNH CÔNG: KHỚP NHAU ---
                    matchedPairs.push(selectedWordId);
                    
                    wordCard.classList.remove("active");
                    wordCard.classList.add("matched");
                    imgCard.classList.remove("active");
                    imgCard.classList.add("matched");

                    // Vẽ đường nối cố định rực rỡ giữa hai điểm neo
                    drawConnectedLine(selectedWordId);

                    // Tăng điểm số
                    score++;
                    document.getElementById("score-text").innerText = `${score}/6`;

                    // Âm thanh và lời động viên vui tai
                    playSuccessSound();
                    speakEncouragement();

                    // Đặt lại các lựa chọn hiện tại
                    selectedWordId = null;
                    selectedImageId = null;

                    // Kiểm tra hoàn thành trò chơi
                    if (score === currentLevel) {
                        // Cập nhật câu chữ chúc mừng theo số lượng từ
                        const congratsText = document.querySelector(".congrats-modal p");
                        congratsText.innerText = `Bé thật xuất sắc! Bé đã nghe và nối chính xác toàn bộ ${currentLevel} từ vựng chủ đề Trái Cây rồi đấy. Ba mẹ hãy thưởng cho bé một tràng pháo tay nhé! 🎉`;
                        
                        setTimeout(() => {
                            document.getElementById("congrats-screen").classList.add("show");
                        }, 1500);
                    }

                } else {
                    // --- THẤT BẠI: KHÔNG KHỚP ---
                    mistakes++;
                    document.getElementById("mistakes-text").innerText = mistakes;

                    // Rung giật hiệu ứng sai lầm
                    wordCard.classList.add("shake");
                    imgCard.classList.add("shake");

                    // Âm thanh báo động Oh No vui nhộn
                    playFailSound();

                    // Gỡ bỏ rung lắc và đặt lại lựa chọn sau hiệu ứng
                    setTimeout(() => {
                        wordCard.classList.remove("shake", "active");
                        imgCard.classList.remove("shake", "active");
                    }, 400);

                    selectedWordId = null;
                    selectedImageId = null;
                }
            }
        }

        // ================= VẼ ĐƯỜNG NỐI SVG CHUẨN XÁC GIỮA HAI THẺ =================
        function drawConnectedLine(id) {
            const wordCard = document.getElementById(`word-${id}`);
            const imgCard = document.getElementById(`img-${id}`);
            const svg = document.getElementById("lines-svg");

            if (!wordCard || !imgCard) return;

            // Định vị điểm neo cột chữ (Nằm mép bên phải thẻ)
            const wordAnchor = wordCard.querySelector(".anchor-point");
            const wordRect = wordAnchor.getBoundingClientRect();

            // Định vị điểm neo cột ảnh (Nằm mép bên trái thẻ)
            const imgAnchor = imgCard.querySelector(".anchor-point");
            const imgRect = imgAnchor.getBoundingClientRect();

            // Khung chứa SVG để chuyển đổi tọa độ tương đối chính xác
            const svgRect = svg.getBoundingClientRect();

            const startX = wordRect.left + wordRect.width / 2 - svgRect.left;
            const startY = wordRect.top + wordRect.height / 2 - svgRect.top;
            const endX = imgRect.left + imgRect.width / 2 - svgRect.left;
            const endY = imgRect.top + imgRect.height / 2 - svgRect.top;

            // Sử dụng các màu sắc vui nhộn ngẫu nhiên cho đường nối của mỗi từ
            const colors = ["#3b82f6", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6", "#ec4899"];
            const chosenColor = colors[matchedPairs.indexOf(id) % colors.length];

            // Tạo đường nối SVG
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", startX);
            line.setAttribute("y1", startY);
            line.setAttribute("x2", endX);
            line.setAttribute("y2", endY);
            line.setAttribute("stroke", chosenColor);
            line.setAttribute("stroke-width", "5");
            line.setAttribute("stroke-linecap", "round");
            line.setAttribute("stroke-dasharray", "8, 4"); // Hiệu ứng nét đứt đáng yêu
            line.id = `line-${id}`;

            svg.appendChild(line);
        }

        // Tự động vẽ lại các đường nối khi người dùng thu phóng/đổi kích cỡ màn hình Canva
        window.onresize = function() {
            const svg = document.getElementById("lines-svg");
            svg.innerHTML = "";
            matchedPairs.forEach(id => {
                drawConnectedLine(id);
            });
        };

        // ================= TẠO HIỆU ỨNG BONG BÓNG TRẺ EM BAY BỔNG =================
        function createBackgroundBubbles() {
            // Xóa các bóng cũ nếu chơi lại
            document.querySelectorAll(".bubble").forEach(b => b.remove());

            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement("div");
                bubble.className = "bubble";
                
                const size = Math.random() * 40 + 15;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 100}%`;
                
                // Trì hoãn thời gian khởi động ngẫu nhiên để các bóng bay không đồng loạt
                bubble.style.animationDelay = `${Math.random() * 4}s`;
                bubble.style.animationDuration = `${Math.random() * 3 + 3}s`;

                // Đổi gam màu nhẹ pastel dễ thương
                const pastelColors = [
                    "rgba(191, 219, 254, 0.5)", 
                    "rgba(187, 247, 208, 0.5)", 
                    "rgba(254, 215, 170, 0.5)", 
                    "rgba(253, 244, 180, 0.5)"
                ];
                bubble.style.backgroundColor = pastelColors[Math.floor(Math.random() * pastelColors.length)];

                document.body.appendChild(bubble);
            }
        }

        function restartGame() {
            initGame();
        }

        // Bắt đầu game sau khi nạp trang hoàn tất
        window.onload = function() {
            initGame();
        };
    </script>
</body>
